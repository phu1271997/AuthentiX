name: AuthentiX CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest genlayer-test

      - name: Run Contract Unit Tests
        run: |
          pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Set up python for node-gyp if needed

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Build
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_CONTRACT_ADDRESS: "0xf443E354c34eD835C6Bc0782Eae99B8b1fDD3C92"
          NEXT_PUBLIC_RPC_URL: "https://studio.genlayer.com/api"
